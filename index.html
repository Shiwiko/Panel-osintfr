<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SHIWIKO | TERMINAL OSINT</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; }
        .terminal { background: #000; border: 1px solid #00ff41; width: 80%; max-width: 800px; padding: 20px; box-shadow: 0 0 20px #00ff4133; margin-top: 50px; }
        h1 { text-shadow: 0 0 10px #00ff41; font-size: 1.5rem; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        input, select, button { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; margin: 5px; outline: none; }
        button:hover { background: #00ff41; color: #000; cursor: pointer; }
        #output { white-space: pre-wrap; margin-top: 20px; color: #00ff41; border-top: 1px dashed #00ff41; padding-top: 15px; min-height: 100px; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="terminal">
        <h1 class="glitch">SYSTEM SHIWIKO v2.0 - OSINT MODULE</h1>
        <div>
            <input type="text" id="target" placeholder="Entrez IP ou Pseudo...">
            <select id="type">
                <option value="ip">ADRESSE IP</option>
                <option value="discord">DISCORD ID</option>
                <option value="roblox">ROBLOX USER</option>
            </select>
            <button onclick="startScan()">LANCER LE SCAN</button>
        </div>
        <div id="output">> Système prêt. En attente de cible...</div>
    </div>

    <script>
        async function startScan() {
            const target = document.getElementById('target').value;
            const type = document.getElementById('type').value;
            const output = document.getElementById('output');
            
            output.innerText = "> Initialisation du scan...\n> Connexion aux serveurs distants...";
            
            const response = await fetch('/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target, type})
            });
            
            const result = await response.json();
            if(result.status === "success") {
                output.innerText = "> SCAN RÉUSSI :\n\n" + result.data;
            } else {
                output.innerText = "> ERREUR : " + result.message;
            }
        }
    </script>
</body>
</html>
