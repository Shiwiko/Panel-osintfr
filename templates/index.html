<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SHIWIKO OMNI-OSINT</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 1px solid #0f0; padding: 20px; max-width: 800px; margin: auto; box-shadow: 0 0 15px #0f03; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; background: #000; border: 1px solid #0f0; color: #0f0; font-family: inherit; }
        button:hover { background: #0f0; color: #000; cursor: pointer; }
        #res { border-top: 1px dashed #0f0; margin-top: 20px; padding-top: 20px; white-space: pre-wrap; word-break: break-all; }
        #avatar { width: 100px; border-radius: 50%; display: none; margin: 10px 0; border: 1px solid #0f0; }
        a { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>[ SHIWIKO MULTI-SCANNER ]</h2>
        <img id="avatar" src="">
        <input type="text" id="target" placeholder="Cible (IP, Pseudo, ID, Email)...">
        <select id="type">
            <option value="tracking">USER_TRACKING (SOCIALS)</option>
            <option value="ip">IP_DEEP_SCAN (FULL DATA)</option>
            <option value="discord">DISCORD_LOOKUP (ID)</option>
            <option value="roblox">ROBLOX_LOOKUP (PSEUDO)</option>
            <option value="email">EMAIL_BREACH_CHECK</option>
        </select>
        <button onclick="run()">LANCER L'EXTRACTION</button>
        <div id="res">SYSTEM_IDLE...</div>
    </div>

    <script>
        function linkify(text) {
            return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
        }

        async function run() {
            const out = document.getElementById('res');
            const img = document.getElementById('avatar');
            out.innerText = "RUNNING_PROCESS...";
            img.style.display = "none";

            const r = await fetch('/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target: document.getElementById('target').value, type: document.getElementById('type').value})
            });
            const d = await r.json();
            if(d.status === "success") {
                out.innerHTML = linkify(d.data);
                if(d.img) { img.src = d.img; img.style.display = "block"; }
            } else { out.innerText = "ERROR: " + d.message; }
        }
    </script>
</body>
</html>
