<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SHIWIKO | OSINT PANEL</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 50px; }
        .box { border: 2px solid #00ff41; width: 100%; max-width: 600px; padding: 30px; box-shadow: 0 0 15px #00ff4155; }
        input, select, button { width: 100%; margin-bottom: 15px; padding: 10px; background: #000; border: 1px solid #00ff41; color: #00ff41; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: #00ff41; color: #000; }
        #res { border-top: 1px solid #333; margin-top: 20px; padding-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="box">
        <h1>SHIWIKO</h1>
        <input type="text" id="target" placeholder="Cible (IP, ID Discord, Email)...">
        <select id="type">
            <option value="ip">SCAN IP</option>
            <option value="discord">SCAN DISCORD ID</option>
            <option value="email">SCAN EMAIL</option>
        </select>
        <button onclick="run()">LANCER LE SCAN</button>
        <div id="res">> En attente...</div>
    </div>
    <script>
        async function run() {
            let res = document.getElementById('res');
            res.innerText = "> Scan en cours...";
            let response = await fetch('/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target: document.getElementById('target').value, type: document.getElementById('type').value})
            });
            let data = await response.json();
            res.innerText = data.status === "success" ? data.data : "ERREUR : " + data.message;
        }
    </script>
</body>
</html>
